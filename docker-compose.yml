services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Sem mapeamento de porta no host: o banco só é acessível pela rede interna do
    # compose. Para inspecionar use `docker compose exec postgres psql -U nexus nexus_desk`.
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_desk}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_desk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Também só interno (sem porta exposta no host).
    expose:
      - "6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind apenas em localhost: o tráfego público deve passar por um reverse proxy
    # com HTTPS (ver DEPLOY.md). Em produção o cookie de sessão é Secure e exige TLS.
    ports:
      - "127.0.0.1:3000:3000"
    # Variáveis de runtime (segredos, integrações) vêm do .env.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Conexões internas do compose (têm prioridade sobre o que estiver no .env).
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus_desk}
    volumes:
      - app-uploads:/app/public/uploads
      # Os instaladores do agente vêm na imagem (versionados via Git LFS), sem mount do host.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  app-uploads:
