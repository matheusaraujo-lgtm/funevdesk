name: Deploy (rebuild Docker no servidor)

# Dispara a cada push na main e também manualmente pelo botão "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Garante que dois deploys não rodem ao mesmo tempo (o mais novo cancela o anterior).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar via SSH e reconstruir o Docker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "==> Atualizando código do git"
            git fetch --all
            git reset --hard origin/main
            git lfs pull

            echo "==> Reconstruindo e subindo os containers"
            docker compose up -d --build --remove-orphans

            echo "==> Limpando imagens antigas"
            docker image prune -f

            echo "==> Status final"
            docker compose ps
